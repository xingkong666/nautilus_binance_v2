# 生产环境配置
env: prod

logging:
  level: WARNING
  format: json
  console: false

data:
  catalog_dir: data/processed/catalog
  raw_dir: data/raw
  features_dir: data/features

redis:
  host: "127.0.0.1"
  port: 6379
  db: 0

monitoring:
  enabled: true
  prometheus_port: 9100

risk:
  enabled: true
  mode: hard

exchange:
  environment: LIVE

execution:
  submit_orders: false

live:
  strategy_config: configs/strategies/vegas_tunnel.yaml
  universe_top_n: 200
  exclude_stablecoin_bases: true
