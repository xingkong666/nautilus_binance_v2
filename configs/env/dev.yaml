# 开发环境配置
env: dev

logging:
  level: DEBUG
  format: json
  console: true

data:
  catalog_dir: data/processed/catalog
  raw_dir: data/raw
  features_dir: data/features

redis:
  host: "127.0.0.1"
  port: 6379
  db: 0

monitoring:
  enabled: false
  prometheus_port: 9100

risk:
  enabled: true
  mode: soft  # soft=告警不阻断, hard=阻断

exchange:
  environment: TESTNET

execution:
  submit_orders: true

live:
  strategy_config: configs/strategies/vegas_tunnel.yaml
  universe_top_n: 200
  exclude_stablecoin_bases: true
