# 开发环境配置
env: dev

logging:
    level: DEBUG
    format: json
    console: true

data:
    catalog_dir: data/processed/catalog
    raw_dir: data/raw
    features_dir: data/features

redis:
    host: "127.0.0.1"
    port: 6379
    db: 0

cache:
    enabled: true
    database: redis
    live:
        flush_on_start: true  # 重启时清空旧 cache，避免 PENDING_CANCEL 残留订单产生 Residual WARN
    backtest:
        use_instance_id: true
        flush_on_start: false

monitoring:
    enabled: false
    prometheus_port: 9100

risk:
    enabled: true
    mode: soft # soft=告警不阻断, hard=阻断

exchange:
    environment: TESTNET

execution:
    submit_orders: true

live:
    strategy_config: configs/strategies/market_maker.yaml
    universe_top_n: 200
    exclude_stablecoin_bases: true
