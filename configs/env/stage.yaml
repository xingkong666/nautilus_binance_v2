# 预发布环境配置
env: stage

logging:
  level: INFO
  format: json
  console: false

data:
  catalog_dir: data/processed/catalog
  raw_dir: data/raw
  features_dir: data/features

monitoring:
  enabled: true
  prometheus_port: 9100

risk:
  enabled: true
  mode: hard

exchange:
  environment: TESTNET

execution:
  submit_orders: false

live:
  strategy_config: configs/strategies/vegas_tunnel.yaml
  universe_top_n: 200
  exclude_stablecoin_bases: true
