# 小资金生产环境配置（本金 ≤ 5000 USDT）
# 使用方式：覆盖 prod.yaml
#   ENV=small_cap uv run python -m src.app.bootstrap
#
# 关键调整：
#   1. 风控参数按权益比例收紧（daily_loss=150U、max_position=2000U）
#   2. 使用 small_capital_2500u.yaml 策略配置
#   3. submit_orders 默认仍为 false — 确认无误后手动改为 true

env: small_cap

logging:
  level: INFO
  format: json
  console: false

data:
  catalog_dir: data/processed/catalog
  raw_dir: data/raw
  features_dir: data/features

redis:
  host: "127.0.0.1"
  port: 6379
  db: 0

cache:
  enabled: true
  database: redis
  live:
    flush_on_start: false
  backtest:
    use_instance_id: true
    flush_on_start: false

monitoring:
  enabled: true
  prometheus_port: 9100

# 小资金风控：激活 global_risk.yaml 中 small_capital 配置块
risk:
  enabled: true
  mode: hard
  profile: small_capital   # 加载 global_risk.yaml 下的 small_capital.* 覆盖 risk.*

exchange:
  environment: LIVE

execution:
  submit_orders: false     # 上线前先 dry-run 确认，确认后改为 true

live:
  strategy_config: configs/strategies/small_capital_2500u.yaml
  universe_top_n: 4        # 只跑 BTC/ETH/SOL/BNB 四个标的
  exclude_stablecoin_bases: true

# -----------------------------------------------------------------------
# 成长阶段检查点（手动调整 margin_pct_per_trade）
#
# Phase 1  2500  →  5000 U  | margin_pct=6.0, daily_loss=150U
# Phase 2  5000  → 10000 U  | margin_pct=5.0, daily_loss=300U  ← 权益翻倍后在策略 yaml 中修改
# Phase 3 10000  → 20000 U  | margin_pct=4.0, daily_loss=600U  ← 稳健模式
# -----------------------------------------------------------------------
