# 告警配置
alerting:
  enabled: true
  # 风险提示 去重冷却窗口（同 rule_name + instrument_id），单位秒
  risk_alert_cooldown_seconds: 60

  channels:
    - type: telegram
      enabled: true
      # bot_token / chat_id 从环境变量读取
      levels: [CRITICAL, ERROR]

    - type: slack
      enabled: false
      webhook_url: ""
      levels: [CRITICAL]

  rules:
    - name: circuit_breaker_triggered
      level: CRITICAL
      message: "🚨 熔断触发: {reason}"

    - name: drawdown_warning
      level: ERROR
      condition: "drawdown_pct > 10.0"   # Phase 1 threshold (was 3.0)
      message: "⚠️ 回撤预警: {drawdown_pct:.1f}%"

    - name: position_limit_warning
      level: ERROR
      condition: "position_usd > max_position_size_usd * 0.8"
      message: "⚠️ 仓位接近上限: {position_usd:.0f} USDT"

    - name: order_fill_latency
      level: WARNING
      condition: "fill_latency_ms > 500"   # was 1000
      message: "⏱️ 成交延迟: {fill_latency_ms}ms"

    - name: reconciliation_mismatch
      level: CRITICAL
      message: "🔴 对账不一致: {details}"

# -----------------------------------------------------------------------
# 监控缺口说明（监控 Gaps） — 以下告警规则已在 YAML定义但无对应 守望者 代码
#
# position_limit_warning：
# 当前：仅 YAML规则，无 守望者 代码实现
# 需要：新建 持仓限价观察者 订阅 PositionEvent，当 position_usd > max_position_size_usd * 0.8 时告警
#
