# 全局风控配置
# 注意：小资金模式（≤5000U）使用 配置/环境/small_cap.yaml覆盖以下参数
risk:
  # 事前风控
  pre_trade:
    max_order_size_usd: 50000
    max_position_size_usd: 200000
    max_leverage: 10
    min_order_interval_ms: 500  # 最小下单间隔
    max_open_orders: 20

  # 实时风控
  real_time:
    max_drawdown_pct: 5.0        # 最大回撤百分比
    daily_loss_limit_usd: 5000   # 单日最大亏损
    trailing_drawdown_pct: 3.0   # 追踪回撤

  # 熔断机制
  circuit_breaker:
    enabled: true
    triggers:
      - type: daily_loss
        threshold_usd: 5000
        action: halt_all        # halt_all / reduce_only / alert_only
        cooldown_minutes: 60

      - type: drawdown
        threshold_pct: 5.0
        action: halt_all
        cooldown_minutes: 120

      - type: rapid_loss         # 短时间连续亏损
        window_minutes: 10
        max_losses: 3
        action: reduce_only
        cooldown_minutes: 30

  # 事后风控
  post_trade:
    reconciliation_interval_minutes: 15
    pnl_attribution: true
    slippage_tracking: true

# -----------------------------------------------------------------------
# 小资金风控参数（2500U 本金）
# 由 配置/环境/small_cap.yaml通过 risk.覆盖 段激活
#
# 计算依据：
#   单日止损上限   = 权益 × 6%   = 150 U（2500U 本金）
#   单笔最大订单   = 权益 × 25%  = 625 U（名义敞口上限）
#   最大总仓位     = 权益 × 80%  = 2000 U
#   回撤熔断       = 8%（给趋势策略留呼吸空间）
#   连续亏损熔断   = 3 笔 / 10 分钟（保持不变）
# -----------------------------------------------------------------------
small_capital:
  pre_trade:
    max_order_size_usd: 625
    max_position_size_usd: 2000
    max_leverage: 10
    min_order_interval_ms: 500
    max_open_orders: 8

  real_time:
    max_drawdown_pct: 8.0
    daily_loss_limit_usd: 150
    trailing_drawdown_pct: 5.0

  circuit_breaker:
    enabled: true
    triggers:
      - type: daily_loss
        threshold_usd: 150
        action: halt_all
        cooldown_minutes: 60

      - type: drawdown
        threshold_pct: 8.0
        action: halt_all
        cooldown_minutes: 120

      - type: rapid_loss
        window_minutes: 10
        max_losses: 3
        action: reduce_only
        cooldown_minutes: 30

# -----------------------------------------------------------------------
# 阶段 1 风控参数（2500U 本金）
# 由 配置/环境/phase1_small_cap.yaml通过 风险 段直接覆盖
