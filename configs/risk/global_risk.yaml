    min_order_interval_ms: 500
    max_open_orders: 15

  real_time:
    max_drawdown_pct: 20.0
    daily_loss_limit_usd: 300
    trailing_drawdown_pct: 13.0

  circuit_breaker:
    enabled: true
    triggers:
      - type: daily_loss
        threshold_usd: 300
        action: halt_all
        cooldown_minutes: 60

      - type: drawdown
        threshold_pct: 20.0
        action: halt_all
        cooldown_minutes: 120

      - type: rapid_loss
        window_minutes: 10
        max_losses: 3
        action: reduce_only
        cooldown_minutes: 30
