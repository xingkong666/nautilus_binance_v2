# 主动做市商策略配置
strategy:
    name: market_maker
    class_path: strategy.market_maker:ActiveMarketMaker

    params:
        # L2 订单簿
        subscribe_order_book: true
        order_book_depth: 10
        imbalance_decay: 0.3
        imbalance_threshold: 0.58
        imbalance_weight_mode: "linear"

        # EMA过滤
        fast_ema_period: 20
        slow_ema_period: 60

        # 动态 价差（SOL tick=0.01, ATR≈4~10 ticks/min）
        base_spread_ticks: 4
        min_spread_ticks: 2
        max_spread_ticks: 30
        spread_vol_multiplier: 1.0
        spread_recovery_ratio: 0.85

        # 倾斜
        alpha_scale_ticks: 2.0
        alpha_tanh_k: 2.0
        inv_scale_ticks: 3.0
        inv_tanh_scale: 2.0

        # 库存 管理（单向净仓，USD notional）
        max_position_usd: 1000.0
        soft_limit: 0.30
        hard_limit: 0.70
        one_side_only_limit: 0.85
        soft_size_min_ratio: 0.30
        kill_switch_limit: 1.20

        # 订单生命周期
        limit_ttl_ms: 120000
        post_only: true
        refresh_every_bar: true
        drift_ticks: 2
        skew_drift_ticks: 1
        fill_cooldown_ms: 500

        # 不平衡死区
        dead_zone_threshold: 0.1

        # sizing （3100U 账户 * 1.5% ≈ 每边报价 45U；兜底 trade_size 保证名义 > $5）
        capital_pct_per_trade: 0.8
        trade_size: "0.06" # fallback: 0.06 SOL ≈ $5.3，满足 Binance 最低名义价值 $5

        # ATR（用于动态 spread）
        atr_period: 14
        atr_sl_multiplier: null # 做市商依靠库存控制(hard_limit/kill_switch)和PnL熔断管理风险，不用ATR止损

        # US-001：微价
        use_microprice: true

        # US-002：逆向选择检测
        adverse_selection_ticks: 3
        adverse_selection_cooldown_ms: 2000

        # US-003：订单队列感知
        order_refresh_ratio: 0.7

        # US-004：delta 驱动的报价
        quote_on_delta: false
        delta_quote_min_interval_ms: 100

        # US-005：已实现波动率
        use_realized_vol: false
        rv_window: 20

        # US-006：分层报价
        quote_layers: 1
        layer_spread_step_ticks: 1.0
        layer_size_decay: 0.7

        # US-007：PnL速度断路器
        max_loss_usd: 20.0
        loss_window_ms: 60000
        pnl_cb_cooldown_ms: 120000

        # US-008：Market质量过滤器
        max_book_spread_ticks: 20.0
        imbalance_spike_threshold: 0.9

        # US-009：成本模型
        min_expected_profit_bps: 1.0
        taker_fee_bps: 4.0

        # V3：成交流 Alpha
        subscribe_trades: true
        trade_flow_weight: 0.4

        # V3：交易前逆向撤单
        pretrade_cancel_ticks: 0.5

        # V3：微价格深度利用
        microprice_skew_scale: 1.0

        # V3：库存分级控制
        deeper_layer_inv_threshold: 0.5

        # V4：队列位置
        queue_norm_volume: 10000.0
        queue_improve_threshold: 0.7

        # V4：有毒流（Toxic Flow）
        toxic_decay: 0.9

        # V4：报价质量得分
        quote_score_threshold: -0.5
        toxic_one_side_threshold: 0.5

        # V5：microprice alpha 驱动程序
        mp_alpha_weight: 0.5
        imbalance_weight: 0.3

        # V5：非对称 Bid/Ask Alpha
        mp_bias_strength: 0.3

        # V5：成交概率驱动执行
        withdraw_fill_prob_threshold: 0.05
        fill_prob_spread_adj: true

        # V5：有毒流预防性撤单
        toxic_mp_drift_ticks: 1.5

        # V5：非对称分层报价
        asymmetric_layers: true

    instruments:
        - PNUTUSDC-PERP.BINANCE

    bar_type: "{instrument_id}-1-MINUTE-LAST-EXTERNAL"

    subscribe:
        bars: true
        trade_ticks: true
        quote_ticks: false
        order_book: true

    close_positions_on_stop: true
    reduce_only_on_stop: true
